name: Security Scan

on:
  pull_request:
    paths:
      - "src/**"
      - "infra/**"
      - ".github/workflows/security-scan.yml"
      - ".checkov.yml"
      - "infra/.checkov.baseline"
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-scan-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  checkov:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra/
          framework: terraform
          config_file: .checkov.yml
          baseline: infra/.checkov.baseline
          soft_fail: false

  trivy-fs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Trivy FS scan — infra (Terraform/IaC, gate on CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: infra
          severity: CRITICAL
          exit-code: "1"
      - name: Trivy FS scan — infra (SARIF report)
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: infra
          format: sarif
          output: trivy-fs-infra.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"
      - name: Upload Trivy infra FS report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-infra
          path: trivy-fs-infra.sarif
      - name: Trivy FS scan — src (Dockerfiles + dependencies, SARIF report-only)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: src
          format: sarif
          output: trivy-fs-src.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"
      - name: Upload Trivy src FS report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-src
          path: trivy-fs-src.sarif
