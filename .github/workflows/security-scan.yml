name: Security Scan

on:
  pull_request:
    paths:
      - "src/**"
      - "infra/**"
      - ".github/workflows/security-scan.yml"
      - ".checkov.yml"
      - "infra/.checkov.baseline"
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  checkov:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra/
          framework: terraform
          config_file: .checkov.yml
          baseline: infra/.checkov.baseline
          soft_fail: false

  trivy-fs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: infra
          severity: CRITICAL
          exit-code: "1"
