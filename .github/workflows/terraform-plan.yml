name: Terraform Plan

on:
  pull_request:
    paths:
      - "infra/**"
      - ".github/workflows/terraform-plan.yml"
      - ".checkov.yml"
      - "infra/.checkov.baseline"

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  AWS_REGION: ap-southeast-1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  # GitHub forbids repository variables named GITHUB_* — use workflow context instead
  TF_VAR_github_org: ${{ github.repository_owner }}
  TF_VAR_github_repo: ${{ github.event.repository.name }}

jobs:
  plan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/environments/aws
    steps:
      - uses: actions/checkout@v6

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_PLAN_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.5.7

      - name: Terraform Init
        run: terraform init -input=false -backend-config="bucket=${{ secrets.AWS_TF_STATE_BUCKET }}"

      - run: terraform fmt -check -recursive
        working-directory: infra

      - run: terraform validate

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -input=false 2>&1 | tee plan.txt
        continue-on-error: true

      - uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra/
          framework: terraform
          config_file: .checkov.yml
          baseline: infra/.checkov.baseline
          soft_fail: true

      - uses: actions/github-script@v9
        if: github.event_name == 'pull_request' && always()
        env:
          PLAN_OUTCOME: ${{ steps.plan.outcome }}
        with:
          script: |
            const fs = require('fs');
            const planPath = 'infra/environments/aws/plan.txt';
            const plan = fs.existsSync(planPath)
              ? fs.readFileSync(planPath, 'utf8')
              : '_No plan output (init/plan failed before writing plan.txt)._';
            const marker = '<!-- terraform-plan-comment -->';
            const body =
              marker +
              '\n## Terraform Plan\n' +
              `Plan step: **${process.env.PLAN_OUTCOME}**\n` +
              '```\n' +
              plan.slice(0, 60000) +
              '\n```';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }

      - name: Fail if Terraform plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1
