name: CI Build and Push to ECR

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - ".github/workflows/ci-build-push.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: ci-build-push-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ap-southeast-1

jobs:
  test-go:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: frontend
            path: src/frontend
          - name: productcatalogservice
            path: src/productcatalogservice
          - name: checkoutservice
            path: src/checkoutservice
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.service.path }}/go.mod
          cache-dependency-path: ${{ matrix.service.path }}/go.sum
      - name: Run unit tests
        run: go test ./...
        working-directory: ${{ matrix.service.path }}

  build-push:
    needs: test-go
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: frontend
            context: src/frontend
          - name: productcatalogservice
            context: src/productcatalogservice
          - name: cartservice
            context: src/cartservice/src
          - name: checkoutservice
            context: src/checkoutservice
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ECR_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/mini-ecommerce/${{ matrix.service.name }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/mini-ecommerce/${{ matrix.service.name }}:latest
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}

      # Image is pushed before scanning so Trivy can pull it directly from ECR.
      # Trade-off: a CRITICAL-vulnerable image is briefly in ECR before the gate
      # fails and blocks the workflow. For production, scan a locally-loaded image
      # before push (build with push:false → scan → re-push on pass).
      - name: Trivy gate (fail on CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/mini-ecommerce/${{ matrix.service.name }}:${{ github.sha }}
          severity: CRITICAL
          exit-code: "1"

      - name: Run Trivy vulnerability scanner (SARIF report)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/mini-ecommerce/${{ matrix.service.name }}:${{ github.sha }}
          format: sarif
          output: trivy-${{ matrix.service.name }}.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-${{ matrix.service.name }}
          path: trivy-${{ matrix.service.name }}.sarif
