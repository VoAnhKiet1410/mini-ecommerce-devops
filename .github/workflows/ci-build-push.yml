name: CI Build and Push to ECR

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - ".github/workflows/ci-build-push.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: ci-build-push-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ap-southeast-1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test-go:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: frontend
            path: src/frontend
          - name: productcatalogservice
            path: src/productcatalogservice
          - name: checkoutservice
            path: src/checkoutservice
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: ${{ matrix.service.path }}/go.mod
          cache-dependency-path: ${{ matrix.service.path }}/go.sum
      - name: Run unit tests
        run: go test ./...
        working-directory: ${{ matrix.service.path }}

  test-dotnet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Run cartservice unit tests
        # Startup falls back to AddDistributedMemoryCache when REDIS_ADDR is unset,
        # so tests run fully in-process without a Redis sidecar.
        run: dotnet test src/cartservice/tests/cartservice.tests.csproj --configuration Release --logger "console;verbosity=normal"

  # Determines whether AWS secrets are configured. build-push is skipped (not
  # failed) when the stack is torn down, keeping the overall workflow green.
  check-aws-secrets:
    runs-on: ubuntu-latest
    outputs:
      available: ${{ steps.probe.outputs.available }}
    steps:
      - id: probe
        env:
          ECR_ROLE: ${{ secrets.AWS_ECR_ROLE_ARN }}
        run: |
          if [ -n "$ECR_ROLE" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "AWS_ECR_ROLE_ARN not set — ECR push skipped (AWS stack is down)"
          fi

  # Verifies the OIDC provider actually exists in AWS. Secrets may remain set
  # after terraform destroy (OIDC provider deleted), which would cause build-push
  # to run and fail with "No OpenIDConnect provider found". This job catches that
  # case so build-push is skipped cleanly regardless of whether secrets were cleared.
  verify-oidc:
    needs: [check-aws-secrets]
    if: needs.check-aws-secrets.outputs.available == 'true'
    runs-on: ubuntu-latest
    outputs:
      reachable: ${{ steps.result.outputs.reachable }}
    steps:
      - name: Test OIDC role assumption
        id: aws-test
        continue-on-error: true
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ECR_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - id: result
        run: |
          if [ "${{ steps.aws-test.outcome }}" == "success" ]; then
            echo "reachable=true" >> "$GITHUB_OUTPUT"
            echo "OIDC reachable — build-push will proceed"
          else
            echo "reachable=false" >> "$GITHUB_OUTPUT"
            echo "::notice::OIDC provider unavailable (AWS stack down) — build-push skipped"
          fi

  build-push:
    needs: [test-go, test-dotnet, check-aws-secrets, verify-oidc]
    if: needs.verify-oidc.outputs.reachable == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: frontend
            context: src/frontend
          - name: productcatalogservice
            context: src/productcatalogservice
          - name: cartservice
            context: src/cartservice/src
          - name: checkoutservice
            context: src/checkoutservice
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ECR_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/mini-ecommerce/${{ matrix.service.name }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/mini-ecommerce/${{ matrix.service.name }}:latest
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}

      # Image is pushed before scanning so Trivy can pull it directly from ECR.
      # Trade-off: a CRITICAL-vulnerable image is briefly in ECR before the gate
      # fails and blocks the workflow. For production, scan a locally-loaded image
      # before push (build with push:false → scan → re-push on pass).
      - name: Trivy gate (fail on CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/mini-ecommerce/${{ matrix.service.name }}:${{ github.sha }}
          severity: CRITICAL
          exit-code: "1"

      - name: Run Trivy vulnerability scanner (SARIF report)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/mini-ecommerce/${{ matrix.service.name }}:${{ github.sha }}
          format: sarif
          output: trivy-${{ matrix.service.name }}.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-${{ matrix.service.name }}
          path: trivy-${{ matrix.service.name }}.sarif

      # Supply-chain steps run only after the Trivy gate passed, so only
      # images that cleared the CRITICAL gate get signed.
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Login cosign to ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          aws ecr get-login-password --region "$AWS_REGION" | \
            cosign login --username AWS --password-stdin "$REGISTRY"

      - name: Generate SBOM (syft, SPDX JSON)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.login-ecr.outputs.registry }}/mini-ecommerce/${{ matrix.service.name }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom-${{ matrix.service.name }}.spdx.json
          upload-artifact: true
          artifact-name: sbom-${{ matrix.service.name }}.spdx.json

      - name: Sign image (cosign keyless via GitHub OIDC)
        env:
          IMAGE: ${{ steps.login-ecr.outputs.registry }}/mini-ecommerce/${{ matrix.service.name }}@${{ steps.build.outputs.digest }}
        run: cosign sign --yes "$IMAGE"

      - name: Attach SBOM attestation (cosign attest)
        env:
          IMAGE: ${{ steps.login-ecr.outputs.registry }}/mini-ecommerce/${{ matrix.service.name }}@${{ steps.build.outputs.digest }}
        run: |
          cosign attest --yes --type spdxjson \
            --predicate "sbom-${{ matrix.service.name }}.spdx.json" \
            "$IMAGE"

  # Closes the GitOps loop: opens a PR against the gitops repo bumping the
  # Kustomize image tags to this commit's SHA. Argo CD picks the change up
  # after the PR is reviewed and merged (human gate stays in place).
  # Skipped gracefully when GITOPS_REPO_TOKEN is not set.
  update-gitops:
    needs: [build-push, check-aws-secrets, verify-oidc]
    if: needs.verify-oidc.outputs.reachable == 'true'
    runs-on: ubuntu-latest
    steps:
      - id: probe
        env:
          GITOPS_TOKEN: ${{ secrets.GITOPS_REPO_TOKEN }}
          ECR_ROLE: ${{ secrets.AWS_ECR_ROLE_ARN }}
        run: |
          if [ -n "$GITOPS_TOKEN" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "GITOPS_REPO_TOKEN not set — gitops PR skipped"
          fi
          # ECR registry hostname derived from the role ARN (not secret —
          # it is public in the gitops manifests anyway).
          ACCOUNT_ID=$(echo "$ECR_ROLE" | cut -d: -f5)
          echo "registry=${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com" >> "$GITHUB_OUTPUT"

      - name: Checkout gitops repo
        if: steps.probe.outputs.available == 'true'
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/mini-ecommerce-gitops
          token: ${{ secrets.GITOPS_REPO_TOKEN }}
          path: gitops

      - name: Install kustomize
        if: steps.probe.outputs.available == 'true'
        run: |
          curl -sLo kustomize.tar.gz \
            "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz"
          tar -xzf kustomize.tar.gz kustomize
          sudo mv kustomize /usr/local/bin/kustomize

      - name: Bump image tags in overlays/aws
        if: steps.probe.outputs.available == 'true'
        working-directory: gitops/apps/online-boutique/overlays/aws
        env:
          REGISTRY: ${{ steps.probe.outputs.registry }}
        run: |
          for svc in frontend productcatalogservice cartservice checkoutservice; do
            kustomize edit set image \
              "${svc}=${REGISTRY}/mini-ecommerce/${svc}:${GITHUB_SHA}"
          done
          git diff --stat

      - name: Open PR on gitops repo
        if: steps.probe.outputs.available == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITOPS_REPO_TOKEN }}
          path: gitops
          branch: ci/image-${{ github.sha }}
          commit-message: "ci: bump images to ${{ github.sha }}"
          title: "ci: bump happy-path images to ${{ github.sha }}"
          body: |
            Automated image bump from CI run [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).

            | Service | New tag |
            |---------|---------|
            | frontend | `${{ github.sha }}` |
            | productcatalogservice | `${{ github.sha }}` |
            | cartservice | `${{ github.sha }}` |
            | checkoutservice | `${{ github.sha }}` |

            Source commit: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
          delete-branch: true
