# kube-prometheus-stack — tuned for single m7i-flex.large EKS node (demo)
# Install: scripts/install-monitoring.ps1 or docs/runbooks/observability.md
# Grafana admin password: set at install time (--set), not committed.

prometheus:
  prometheusSpec:
    retention: 2d
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

grafana:
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 300m
      memory: 512Mi

alertmanager:
  enabled: false

kubeStateMetrics:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi

prometheusOperator:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
